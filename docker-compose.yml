version: '3.9'

services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: pos-backend-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:admin123@host.docker.internal:5432/pos_umkm
      - JWT_SECRET=pos_umkm_development_secret_key_123456789
      - JWT_EXPIRES_IN=24h
      - ENCRYPTION_KEY=a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f61234
      - FRONTEND_URL=http://localhost:5173
      - EMAIL_FROM=noreply@pos-umkm.com
      - EMAIL_SERVICE=nodemailer
    volumes:
      - ./packages/backend/src:/app/src
      - ./packages/backend/prisma:/app/prisma
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pos-network
    command: npm run dev
    restart: unless-stopped

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: pos-frontend-dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    volumes:
      - ./packages/frontend/src:/app/src
      - /app/node_modules
    networks:
      - pos-network
    command: npm run dev
    restart: unless-stopped

networks:
  pos-network:
    driver: bridge
